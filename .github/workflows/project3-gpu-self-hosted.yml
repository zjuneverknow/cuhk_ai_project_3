name: Project 3 GPU Self Hosted

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: "Which experiment to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - flatten
          - cls
          - mean
      epochs:
        description: "Number of training epochs"
        required: true
        default: "6"

jobs:
  run-gpu-experiments:
    runs-on: [self-hosted, windows, gpu]
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check NVIDIA GPU
        shell: powershell
        run: nvidia-smi

      - name: Install uv
        shell: powershell
        run: |
          if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
            irm https://astral.sh/uv/install.ps1 | iex
            "$env:USERPROFILE\.local\bin" | Out-File `
              -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Install CPU dependencies
        shell: powershell
        run: uv sync --locked

      - name: Install CUDA PyTorch
        shell: powershell
        run: uv pip install --upgrade torch --index-url https://download.pytorch.org/whl/cu121

      - name: Verify CUDA
        shell: powershell
        run: |
          uv run python -c "import torch; print(torch.__version__); print(torch.cuda.is_available()); print(torch.version.cuda); print(torch.cuda.get_device_name(0))"

      - name: Run selected experiment
        shell: powershell
        run: |
          Remove-Item -Recurse -Force outputs, outputs_cls, outputs_mean -ErrorAction SilentlyContinue

          if ("${{ inputs.experiment }}" -eq "flatten") {
            uv run python project_tasks.py --classifier-head flatten --epochs "${{ inputs.epochs }}"
          }
          elseif ("${{ inputs.experiment }}" -eq "cls") {
            uv run python project_tasks.py --classifier-head cls --epochs "${{ inputs.epochs }}"
          }
          elseif ("${{ inputs.experiment }}" -eq "mean") {
            uv run python project_tasks.py --classifier-head mean --epochs "${{ inputs.epochs }}"
          }
          else {
            uv run python project_tasks.py --classifier-head flatten --epochs "${{ inputs.epochs }}"
            uv run python project_tasks.py --classifier-head cls --epochs "${{ inputs.epochs }}"
            uv run python project_tasks.py --classifier-head mean --epochs "${{ inputs.epochs }}"
          }

      - name: Upload experiment outputs
        uses: actions/upload-artifact@v4
        with:
          name: project3-gpu-experiment-outputs
          path: |
            outputs/
            outputs_cls/
            outputs_mean/
          if-no-files-found: error
